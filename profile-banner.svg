<svg width="800" height="300" viewBox="0 0 800 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&amp;family=Space+Grotesk:wght@500;700&amp;display=swap');
      .title-text {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-weight: 800;
        font-size: 52px;
        fill: url(#gold-metallic);
      }
      .subtitle-text {
        font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-weight: 700;
        font-size: 15px;
        letter-spacing: 4px;
        fill: #E2E8F0;
      }
      .detail-text {
        font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-weight: 500;
        font-size: 11px;
        letter-spacing: 6px;
        fill: #A7F3D0; /* mint gold tint */
      }
      .node {
        animation: pulse 4s ease-in-out infinite alternate;
      }
      @keyframes pulse {
        0% { r: 4px; opacity: 0.7; }
        100% { r: 7px; opacity: 1; }
      }
    </style>

    <!-- Background Gradients -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090A0F" />
      <stop offset="50%" stop-color="#0E1017" />
      <stop offset="100%" stop-color="#141724" />
    </linearGradient>

    <!-- Premium Metallic Gold Gradient -->
    <linearGradient id="gold-metallic" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FCE7F3" /> <!-- Soft light rose-gold start -->
      <stop offset="40%" stop-color="#F59E0B" /> <!-- Warm honey gold -->
      <stop offset="70%" stop-color="#D97706" /> <!-- Deep bronze-gold -->
      <stop offset="100%" stop-color="#FBBF24" /> <!-- Bright gold highlight -->
    </linearGradient>
    
    <linearGradient id="gold-accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D" />
      <stop offset="100%" stop-color="#B45309" />
    </linearGradient>

    <!-- Soft Muted Aurora Glows -->
    <radialGradient id="aurora-purple" cx="100%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.18" />
      <stop offset="60%" stop-color="#4F46E5" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#090A0F" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="aurora-gold" cx="0%" cy="100%" r="50%">
      <stop offset="0%" stop-color="#D97706" stop-opacity="0.12" />
      <stop offset="70%" stop-color="#0E1017" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="aurora-center" cx="70%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#047857" stop-opacity="0.1" /> <!-- Minty AI Emerald aura -->
      <stop offset="100%" stop-color="#0E1017" stop-opacity="0" />
    </radialGradient>

    <!-- Glow Filter -->
    <filter id="glow-heavy" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="glow-subtle" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="800" height="300" fill="url(#bg-gradient)" />
  
  <!-- Aurora Layers -->
  <rect width="800" height="300" fill="url(#aurora-purple)" />
  <rect width="800" height="300" fill="url(#aurora-gold)" />
  <rect width="800" height="300" fill="url(#aurora-center)" />

  <!-- Grid Pattern Overlay (Muted/Premium) -->
  <g opacity="0.05">
    <path d="M 0,30 L 800,30 M 0,60 L 800,60 M 0,90 L 800,90 M 0,120 L 800,120 M 0,150 L 800,150 M 0,180 L 800,180 M 0,210 L 800,210 M 0,240 L 800,240 M 0,270 L 800,270" stroke="#FFFFFF" stroke-width="0.5" />
    <path d="M 50,0 L 50,300 M 100,0 L 100,300 M 150,0 L 150,300 M 200,0 L 200,300 M 250,0 L 250,300 M 300,0 L 300,300 M 350,0 L 350,300 M 400,0 L 400,300 M 450,0 L 450,300 M 500,0 L 500,300 M 550,0 L 550,300 M 600,0 L 600,300 M 650,0 L 650,300 M 700,0 L 700,300 M 750,0 L 750,300" stroke="#FFFFFF" stroke-width="0.5" />
  </g>

  <!-- Abstract Cosmic Elements / Wave -->
  <path d="M-50,220 C150,180 250,280 450,230 C650,180 750,260 850,220" fill="none" stroke="url(#gold-metallic)" stroke-width="1.5" opacity="0.18" />
  <path d="M-50,225 C150,195 250,265 450,215 C650,165 750,245 850,205" fill="none" stroke="#7C3AED" stroke-width="0.5" opacity="0.15" />

  <!-- Neural AI Agent Graph (LangGraph illustration on the Right) -->
  <g id="agentic-graph" transform="translate(480, 20)">
    <!-- Connections -->
    <line x1="200" y1="130" x2="130" y2="80" stroke="#D97706" stroke-width="0.8" opacity="0.25" />
    <line x1="130" y1="80" x2="160" y2="180" stroke="#7C3AED" stroke-width="0.8" opacity="0.2" />
    <line x1="160" y1="180" x2="230" y2="170" stroke="#D97706" stroke-width="0.8" opacity="0.3" />
    <line x1="230" y1="170" x2="200" y2="130" stroke="#34D399" stroke-width="0.8" opacity="0.25" />
    <line x1="200" y1="130" x2="260" y2="80" stroke="#D97706" stroke-width="0.8" opacity="0.35" />
    <line x1="260" y1="80" x2="230" y2="170" stroke="#7C3AED" stroke-width="0.8" opacity="0.2" />
    
    <!-- Outer Node Ring Animations -->
    <circle cx="200" cy="130" r="14" stroke="#F59E0B" stroke-dasharray="2 3" stroke-width="0.7" opacity="0.4" />
    <circle cx="130" cy="80" r="10" stroke="#7C3AED" stroke-dasharray="1 2" stroke-width="0.7" opacity="0.3" />
    <circle cx="260" cy="80" r="18" stroke="#34D399" stroke-dasharray="3 3" stroke-width="0.7" opacity="0.4" />

    <!-- Nodes (Solid Glowing Orbs) -->
    <!-- Node A (LangGraph agent loop central) -->
    <circle cx="200" cy="130" r="6" fill="url(#gold-accent)" filter="url(#glow-subtle)" />
    <!-- Node B (Input RAG) -->
    <circle cx="130" cy="80" r="4.5" fill="#8B5CF6" opacity="0.9" />
    <!-- Node C (State Storage ChromaDB) -->
    <circle cx="160" cy="180" r="5" fill="#4B5563" />
    <circle cx="160" cy="180" r="3" fill="#D1D5DB" />
    <!-- Node D (Tool Node Exec) -->
    <circle cx="230" cy="170" r="5.5" fill="url(#gold-accent)" />
    <!-- Node E (AI Supervisor) -->
    <circle cx="260" cy="80" r="7" fill="#10B981" filter="url(#glow-subtle)" />
  </g>

  <!-- Profile Banner Content (Left Aligned) -->
  <g transform="translate(60, 0)">
    
    <!-- Accent Line -->
    <rect y="85" width="4" height="120" rx="2" fill="url(#gold-accent)" />
    
    <!-- Name with slight drop shadow and beautiful gradient -->
    <text x="25" y="130" class="title-text" filter="url(#glow-subtle)">GEETANSH MALIK</text>
    
    <!-- Taglines -->
    <text x="25" y="170" class="subtitle-text">FULL-STACK DEVELOPER &amp; AGENTIC AI ENGINEER</text>
    <text x="25" y="200" class="detail-text" fill="#D97706">NEXT.JS • LANGGRAPH • MERN • REACT NATIVE</text>
    
  </g>

  <!-- Interactive/Decorative glowing gold particles -->
  <circle cx="80" cy="60" r="1.5" fill="#FBBF24" opacity="0.6" />
  <circle cx="340" cy="70" r="1" fill="#FBBF24" opacity="0.4" />
  <circle cx="480" cy="240" r="2" fill="#FBBF24" opacity="0.5" />
  <circle cx="720" cy="250" r="1.5" fill="#FBBF24" opacity="0.4" />
  <circle cx="250" cy="260" r="1" fill="#8B5CF6" opacity="0.5" />
</svg>
